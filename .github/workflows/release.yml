name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.6"

      - name: Build arm64
        run: |
          BUILD_ARGS="-c release --arch arm64"
          swift build $BUILD_ARGS
          BIN_PATH=$(swift build $BUILD_ARGS --show-bin-path)
          mkdir -p /tmp/arm64-pkg
          cp "$BIN_PATH/rr" /tmp/arm64-pkg/rr

      - name: Build x86_64
        run: |
          BUILD_ARGS="-c release --arch x86_64"
          swift build $BUILD_ARGS
          BIN_PATH=$(swift build $BUILD_ARGS --show-bin-path)
          mkdir -p /tmp/x64-pkg
          cp "$BIN_PATH/rr" /tmp/x64-pkg/rr

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf rr-${VERSION}-macos-arm64.tar.gz -C /tmp/arm64-pkg rr
          tar czf rr-${VERSION}-macos-x86_64.tar.gz -C /tmp/x64-pkg rr

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: rr-*-macos-*.tar.gz
          generate_release_notes: true
